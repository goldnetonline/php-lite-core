<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maintenance Mode</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1e1b4b 0%, #312e81 50%, #1e1b4b 100%);
            color: #E2E8F0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .container {
            text-align: center;
            max-width: 600px;
        }

        .icon {
            font-size: 4rem;
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            color: #F1F5F9;
        }

        p {
            font-size: 1.1rem;
            color: #94A3B8;
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            margin-top: 2rem;
        }

        .spinner::after {
            content: " ";
            display: block;
            width: 32px;
            height: 32px;
            margin: 8px;
            border-radius: 50%;
            border: 4px solid #8B5CF6;
            border-color: #8B5CF6 transparent #8B5CF6 transparent;
            animation: spinner 1.2s linear infinite;
        }

        @keyframes spinner {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        .logo {
            font-size: 1.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #6366F1, #8B5CF6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 3rem;
            letter-spacing: -1px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">PHP Lite</div>
        <div class="icon">🔧</div>
        <h1>Maintenance Mode</h1>
        <p>We're performing maintenance to improve your experience. We'll be back online shortly.</p>
        <div class="spinner"></div>
    </div>
</body>
</html>
