name: tests

on:
    push:
    pull_request:

jobs:
    core:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: shivammathur/setup-php@v2
              with:
                  php-version: "8.4"
                  coverage: none
            - run: composer install --no-interaction --prefer-dist
            - run: composer validate --strict
            - run: composer audit || true
            - run: composer test
