name: release-packages

on:
    push:
        tags:
            - "v*"

permissions:
    contents: write

jobs:
    verify:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: shivammathur/setup-php@v2
              with:
                  php-version: "8.4"
                  coverage: none
            - name: Validate and test core
              run: |
                  composer install --no-interaction --prefer-dist
                  composer validate --strict
                  composer test

    package-and-release:
        runs-on: ubuntu-latest
        needs: verify
        steps:
            - uses: actions/checkout@v4
            - name: Build package archive
              run: |
                  mkdir -p dist
                  tar -czf dist/php-lite-core-${GITHUB_SHA}.tar.gz --exclude='.git' --exclude='vendor' .
            - name: Upload build artifact
              uses: actions/upload-artifact@v4
              with:
                  name: php-lite-core-${{ github.sha }}
                  path: dist/php-lite-core-${{ github.sha }}.tar.gz
            - name: Create GitHub release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ github.ref_name }}
                  name: ${{ github.ref_name }}
                  prerelease: false
                  files: |
                      dist/php-lite-core-${{ github.sha }}.tar.gz
                  generate_release_notes: true
